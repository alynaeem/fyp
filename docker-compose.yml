# ── DarkPulse — docker-compose.yml ────────────────────────────────────────────
# Brings up: Redis + FastAPI API server
#
# Usage:
#   docker-compose up -d          # start in background
#   docker-compose logs -f api    # follow API logs
#   docker-compose down           # stop and remove containers
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up --build  (first time)

version: "3.9"

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: darkpulse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── FastAPI UI Server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darkpulse_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: "mongodb://mongodb:27017" # override .env — use service name inside Docker network
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mongodb:
        condition: service_started
    volumes:
      - ./api_collector/scripts/trivy_reports:/app/api_collector/scripts/trivy_reports
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
